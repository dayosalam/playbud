version: "3.9"
services:
  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    env_file:
      - backend/.env
    ports:
      - "2121:2121"
    restart: unless-stopped
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
